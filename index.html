<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo List</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">


<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="h-full flex flex-col bg-gradient-to-br from-indigo-50 via-white to-purple-50">

  <div class="flex-1 flex flex-col items-center w-full max-w-2xl px-4 py-4">

    <!-- Header -->
    <header class="w-full flex flex-col items-center mb-4 flex-shrink-0">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-2 shadow-lg shadow-indigo-200">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <h1 id="app-title" class="text-3xl font-bold text-gray-800">My Tasks</h1>
      <p id="task-count" class="text-gray-500 mt-1">0 tasks</p>
    </header>

    <!-- Form -->
    <form id="add-task-form" class="bg-white rounded-2xl shadow-xl shadow-indigo-100 p-6 mb-4 border border-indigo-50 flex-shrink-0 w-full">
      <div class="flex flex-col sm:flex-row gap-3 mb-3">
        <input type="text" id="task-input" placeholder="What needs to be done?" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
      </div>
      <div class="flex flex-col sm:flex-row gap-3 mb-3">
        <textarea id="notes-input" placeholder="Add notes" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition resize-none"></textarea>
      </div>
      <div class="flex flex-col sm:flex-row gap-3 mb-3">
        <select id="priority-input" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
          <option value="" selected disabled>Ajouter la priorité</option>
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
        <input type="datetime-local" id="deadline-input" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition" required>
      </div>
      <button type="submit" id="add-button" class="w-full px-6 py-3 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 active:scale-95 transition shadow-lg shadow-indigo-200">Add Task</button>
    </form>

    <!-- Filters -->
    <div id="filter-container" class="flex justify-center gap-3 mb-4 w-full"></div>

    <!-- Task list -->
    <ul id="task-list" class="flex-1 overflow-y-auto w-full space-y-3 pb-4"></ul>

    <!-- Empty state -->
    <div id="empty-state" class="text-center py-12 hidden w-full flex flex-col items-center">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gray-100 rounded-full mb-4">
        <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
      </div>
      <p id="empty-message" class="text-gray-500 text-lg">No tasks yet. Add one above!</p>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
