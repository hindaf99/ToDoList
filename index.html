<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>To-Do List Intelligente</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>To-Do List</h1>

    <div class="task-input">
      <input type="text" id="taskTitle" placeholder="Nouvelle tâche...">
      
      <select id="taskPriority">
        <option value="low">Basse</option>
        <option value="medium">Moyenne</option>
        <option value="high">Haute</option>
      </select>

      <button id="addTaskBtn">Ajouter</button>
    </div>

    <div class="filters">
      <button data-filter="all">Toutes</button>
      <button data-filter="active">En cours</button>
      <button data-filter="completed">Terminées</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
      <p id="taskCounter"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
